function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function loadData() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try { data = JSON.parse(saved); return; } catch(e) { /* fallthrough */ }
  }
  data = JSON.parse(JSON.stringify(RECURSOS_INICIALES));
  saveData();
}

// =============================================
//  CALCULATIONS
// =============================================
function today() {
  const d = new Date(); d.setHours(0,0,0,0); return d;
}

function daysDiff(dateStr) {
  const target = new Date(dateStr + 'T00:00:00');
  const diff = target - today();
  return Math.ceil(diff / (1000 * 60 * 60 * 24));
}

function docStatus(doc) {
  const days = daysDiff(doc.vencimiento);
  if (days < 0) return 'expired';
  if (days <= doc.diasAviso) return 'warning';
  return 'valid';
}

function getStats() {
  let total = 0, valid = 0, warning = 0, expired = 0;
  const cats = activeCategory === 'global' ? Object.keys(data) : [activeCategory];
  cats.forEach(cat => {
    if (!data[cat]) return;
    data[cat].forEach(entity => {
      entity.documentos.forEach(doc => {
        total++;
        const s = docStatus(doc);
        if (s === 'valid') valid++;
        else if (s === 'warning') warning++;
        else expired++;
      });
    });
  });
  return { total, valid, warning, expired };
}

function getAlerts() {
  const alerts = [];
  Object.keys(data).forEach(cat => {
    data[cat].forEach((entity, ei) => {
      entity.documentos.forEach((doc, di) => {
        const s = docStatus(doc);
        if (s !== 'valid') {
          alerts.push({ cat, entityIdx: ei, docIdx: di, entityName: entity.nombre, entityId: entity.identificador, docName: doc.nombre, vencimiento: doc.vencimiento, days: daysDiff(doc.vencimiento), status: s });
        }
      });
    });
  });
  alerts.sort((a, b) => a.days - b.days);
  return alerts;
}

function formatDate(d) {
  const parts = d.split('-');
  return `${parts[2]}/${parts[1]}/${parts[0]}`;
}

function formatDays(d) {
  if (d < 0) return `${Math.abs(d)}d vencido`;
  if (d === 0) return 'Hoy vence';
  return `${d}d restantes`;
}

    if (searchQuery) {
      entities = entities.filter(e =>
        e.nombre.toLowerCase().includes(searchQuery) ||
        e.identificador.toLowerCase().includes(searchQuery)
      );
    }
    if (activeCategory === 'global' || cats.length > 1) {
      html += `<div class="flex items-center gap-3 mb-4 mt-6">

    } else {
      entities.forEach((e, i) => {

    html += `<button class="btn-add mt-2 mb-6" data-action="addEntity" data-cat="${cat}">

  });
  mc.innerHTML = html;
}

  const doc = data[cat][ei].documentos[di];

  currentModal = { cat, ei, di };
  openModal(`
    <div class="flex items-center gap-3 mb-5">
      <div class="w-10 h-10 rounded-xl bg-amber-500/20 flex items-center justify-center">
        <i data-lucide="settings" class="w-5 h-5 text-amber-400"></i>
      </div>
      <div>
        <h3 class="text-lg font-bold text-white">Configurar Alerta</h3>
        <p class="text-xs text-slate-500">${entity.nombre} · ${doc.nombre}</p>
      </div>
    </div>
    <div class="mb-6">
      <label class="text-xs text-slate-400 block mb-2">Días de anticipación para la alerta</label>
      <input type="number" id="alertDays" class="w-full" value="${doc.diasAviso}" min="1" max="365">
      <p class="text-[11px] text-slate-600 mt-2">La alerta se activará esta cantidad de días antes del vencimiento.</p>
    </div>
    <div class="flex gap-3 justify-end">
      <button class="btn-ghost" data-action="closeModal">Cancelar</button>
      <button class="btn-primary" data-action="confirmConfig">Guardar Configuración</button>
    </div>
  `);
  lucide.createIcons();
}

function openAddEntityModal(cat) {
  const meta = CAT_META[cat];
  currentModal = { cat, action: 'addEntity' };
  openModal(`
    <div class="flex items-center gap-3 mb-5">
      <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background:${meta.color}22;">
        <i data-lucide="plus" class="w-5 h-5" style="color:${meta.color}"></i>
      </div>
      <div>
        <h3 class="text-lg font-bold text-white">Nuevo ${meta.label === 'Empleados' ? 'Empleado' : meta.label === 'Vehículos' ? 'Vehículo' : 'Maquinaria'}</h3>
        <p class="text-xs text-slate-500">Se pre-cargarán los documentos estándar</p>
      </div>
    </div>
    <div class="mb-4">
      <label class="text-xs text-slate-400 block mb-2">Nombre / Descripción</label>
      <input type="text" id="newEntityName" class="w-full" placeholder="Ej: Juan Pérez">
    </div>
    <div class="mb-6">
      <label class="text-xs text-slate-400 block mb-2">${meta.idLabel}</label>
      <input type="text" id="newEntityId" class="w-full" placeholder="Ej: 12.345.678">
    </div>
    <div class="flex gap-3 justify-end">
      <button class="btn-ghost" data-action="closeModal">Cancelar</button>
      <button class="btn-primary" data-action="confirmAddEntity">Agregar</button>
    </div>
  `);
  lucide.createIcons();
}

function openAddDocModal(cat, ei) {
  const entity = data[cat][ei];
  currentModal = { cat, ei, action: 'addDoc' };
  const nextYear = new Date(); nextYear.setFullYear(nextYear.getFullYear() + 1);
  const defDate = nextYear.toISOString().split('T')[0];
  openModal(`
    <div class="flex items-center gap-3 mb-5">
      <div class="w-10 h-10 rounded-xl bg-violet-500/20 flex items-center justify-center">
        <i data-lucide="file-plus" class="w-5 h-5 text-violet-400"></i>
      </div>
      <div>
        <h3 class="text-lg font-bold text-white">Agregar Documento</h3>
        <p class="text-xs text-slate-500">${entity.nombre}</p>
      </div>
    </div>
    <div class="mb-4">
      <label class="text-xs text-slate-400 block mb-2">Nombre del Documento</label>
      <input type="text" id="newDocName" class="w-full" placeholder="Ej: Habilitación Municipal">
    </div>
    <div class="mb-4">
      <label class="text-xs text-slate-400 block mb-2">Fecha de Vencimiento</label>
      <input type="date" id="newDocDate" class="w-full" value="${defDate}">
    </div>
    <div class="mb-6">
      <label class="text-xs text-slate-400 block mb-2">Días de aviso previo</label>
      <input type="number" id="newDocDias" class="w-full" value="30" min="1" max="365">
    </div>
    <div class="flex gap-3 justify-end">
      <button class="btn-ghost" data-action="closeModal">Cancelar</button>
      <button class="btn-primary" data-action="confirmAddDoc">Agregar Documento</button>
    </div>
  `);
  lucide.createIcons();
}

function renderReviewPanel() {
  const alerts = getAlerts().filter(a => a.status === 'warning');
  const panel = document.getElementById('reviewPanel');
  // sort by days ascending (closest first)
  const sorted = [...alerts].sort((a,b) => a.days - b.days);
  panel.innerHTML = `
    <div class="flex items-center justify-between mb-6">
      <div>
        <h3 class="text-lg font-bold text-white flex items-center gap-2">
          <i data-lucide="clock" class="w-5 h-5 text-amber-400"></i> Próximos a Vencer
        </h3>
        <p class="text-xs text-slate-500">${sorted.length} documento${sorted.length!==1?'s':''} dentro del período de alerta</p>
      </div>
      <button class="btn-config" data-action="closeReview"><i data-lucide="x" class="w-5 h-5 text-slate-400 pointer-events-none"></i></button>
    </div>
    ${sorted.length === 0 ? `
      <div class="text-center py-16">
        <i data-lucide="party-popper" class="w-12 h-12 text-emerald-500 mx-auto mb-3"></i>
        <div class="text-sm text-slate-400">¡Ningún documento próximo a vencer!</div>
      </div>` : sorted.map(a => {
        const diasAviso = data[a.cat][a.entityIdx]?.documentos[a.docIdx]?.diasAviso || 30;
        const pct = diasAviso > 0 ? Math.round((1 - a.days / diasAviso) * 100) : 100;
        return `
        <div class="p-4 rounded-xl mb-3 cursor-pointer transition-all hover:scale-[1.01]"
             style="background:rgba(245,158,11,0.06); border:1px solid rgba(245,158,11,0.15);"
             data-action="gotoDoc" data-cat="${a.cat}" data-ei="${a.entityIdx}" data-di="${a.docIdx}">
          <div class="flex items-start justify-between mb-2">
            <div>
              <div class="text-sm font-semibold text-amber-300">${a.docName}</div>
              <div class="text-xs text-slate-500">${a.entityName} · ${CAT_META[a.cat].idLabel}: ${a.entityId}</div>
            </div>
            <span class="text-xs font-bold text-amber-400 bg-amber-500/10 border border-amber-500/20 px-2 py-1 rounded-lg">${a.days}d</span>
          </div>
          <div class="text-xs text-slate-500 mb-2">Vence: ${formatDate(a.vencimiento)}</div>
          <div class="h-1.5 rounded-full bg-slate-800 overflow-hidden">
            <div class="h-full rounded-full transition-all" style="width:${Math.min(pct,100)}%; background: linear-gradient(90deg, #f59e0b, #ef4444);"></div>
          </div>
        </div>`;
      }).join('')}
  `;
  lucide.createIcons();
}

// =============================================
//  TOAST
// =============================================
function showToast(message, type = 'success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  const iconMap = { success: 'check-circle', info: 'info', warning: 'alert-triangle', error: 'x-circle' };
  toast.className = `toast toast-${type}`;
  toast.innerHTML = `<i data-lucide="${iconMap[type]}" class="w-4 h-4 flex-shrink-0"></i> ${message}`;
  container.appendChild(toast);
  lucide.createIcons();
  requestAnimationFrame(() => toast.classList.add('show'));
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 400);
  }, 3500);
}

// =============================================
//  EVENT DELEGATION
// =============================================
document.addEventListener('click', (e) => {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;

  if (action === 'nav') {
    activeCategory = el.dataset.cat;
    searchQuery = '';
    renderAll();
  }
  else if (action === 'toggle') {
    const key = el.dataset.key;
    expandedEntities[key] = !expandedEntities[key];
    renderMain();
    lucide.createIcons();
  }
  else if (action === 'renew') {
    openRenewModal(el.dataset.cat, +el.dataset.ei, +el.dataset.di);
  }
  else if (action === 'config') {
    openConfigModal(el.dataset.cat, +el.dataset.ei, +el.dataset.di);
  }
  else if (action === 'confirmRenew') {
    const dateVal = document.getElementById('renewDate').value;
    if (!dateVal) { showToast('Seleccione una fecha válida', 'warning'); return; }
    const { cat, ei, di } = currentModal;
    data[cat][ei].documentos[di].vencimiento = dateVal;
    saveData(); closeModal(); renderAll();
    showToast('Documento renovado exitosamente', 'success');
  }
  else if (action === 'confirmConfig') {
    const days = parseInt(document.getElementById('alertDays').value);
    if (!days || days < 1) { showToast('Ingrese un valor válido', 'warning'); return; }
    const { cat, ei, di } = currentModal;
    data[cat][ei].documentos[di].diasAviso = days;
    saveData(); closeModal(); renderAll();
    showToast('Configuración de alerta actualizada', 'info');
  }
  else if (action === 'confirmAddEntity') {
    const name = document.getElementById('newEntityName').value.trim();
    const id = document.getElementById('newEntityId').value.trim();
    if (!name || !id) { showToast('Complete todos los campos', 'warning'); return; }
    const { cat } = currentModal;
    const defaultDocs = {
      empleados: ['DNI','ART','Examen Psicofísico','Entrega de EPP','Capacitación de Seguridad','Seguro de Vida'],
      vehiculos: ['Cédula Verde','VTV / RTO','Póliza de Seguro','Comprobante de Pago Patente','LINTI'],
      maquinaria: ['R.U.T.A.','Permiso de Carga Peligrosa','Cert. Pesos y Dimensiones','Carnet de Maquinista']
    };
    const oneYear = new Date(); oneYear.setFullYear(oneYear.getFullYear() + 1);
    const defaultDate = oneYear.toISOString().split('T')[0];
    data[cat].push({
      nombre: name, identificador: id,
      documentos: (defaultDocs[cat] || []).map(n => ({ nombre: n, vencimiento: defaultDate, diasAviso: 30 }))
    });
    saveData(); closeModal(); renderAll();
    showToast(`${CAT_META[cat].label.slice(0,-1)} agregado/a exitosamente`, 'success');
  }
  else if (action === 'closeModal') { closeModal(); }
  else if (action === 'toggleNotif') {
    const panel = document.getElementById('notifPanel');
    const overlay = document.getElementById('notifOverlay');
    const isOpen = panel.classList.contains('open');
    if (isOpen) {
      panel.classList.remove('open'); overlay.classList.remove('open');
    } else {
      renderNotifications(); lucide.createIcons();
      panel.classList.add('open'); overlay.classList.add('open');
    }
  }
  else if (action === 'closeNotif') {
    document.getElementById('notifPanel').classList.remove('open');
    document.getElementById('notifOverlay').classList.remove('open');
  }
  else if (action === 'gotoDoc') {
    const cat = el.dataset.cat, ei = el.dataset.ei, di = el.dataset.di;
    document.getElementById('notifPanel').classList.remove('open');
    document.getElementById('reviewPanel').classList.remove('open');
    document.getElementById('notifOverlay').classList.remove('open');
    activeCategory = cat;
    expandedEntities[`${cat}-${ei}`] = true;
    searchQuery = '';
    renderAll();
    setTimeout(() => {
      const target = document.getElementById(`doc-${cat}-${ei}-${di}`);
      if (target) {
        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        target.style.background = 'rgba(6,182,212,0.15)';
        setTimeout(() => target.style.background = '', 2000);
      }
    }, 150);
  }
  else if (action === 'reset') {
    if (confirm('¿Estás seguro de que quieres BORRAR TODOS LOS DATOS (empleados, vehículos, maquinaria) y dejar la plataforma en cero? Esta acción no se puede deshacer.')) {
      data = { empleados: [], vehiculos: [], maquinaria: [] };
      expandedEntities = {};
      saveData(); renderAll();
      showToast('Todos los datos han sido borrados. Plataforma en cero.', 'info');
    }
  }
  else if (action === 'addEntity') {
    openAddEntityModal(el.dataset.cat);
  }
  else if (action === 'addDoc') {
    openAddDocModal(el.dataset.cat, +el.dataset.ei);
  }
  else if (action === 'confirmAddDoc') {
    const name = document.getElementById('newDocName').value.trim();
    const date = document.getElementById('newDocDate').value;
    const days = parseInt(document.getElementById('newDocDias').value);
    if (!name) { showToast('Ingrese el nombre del documento', 'warning'); return; }
    if (!date) { showToast('Ingrese una fecha válida', 'warning'); return; }
    const { cat, ei } = currentModal;
    data[cat][ei].documentos.push({ nombre: name, vencimiento: date, diasAviso: days || 30 });
    expandedEntities[`${cat}-${ei}`] = true;
    saveData(); closeModal(); renderAll();
    showToast('Documento agregado exitosamente', 'success');
  }
  else if (action === 'deleteDoc') {
    const cat = el.dataset.cat, ei = +el.dataset.ei, di = +el.dataset.di;
    const doc = data[cat][ei].documentos[di];
    if (confirm(`¿Eliminar el documento "${doc.nombre}" de ${data[cat][ei].nombre}?`)) {
      data[cat][ei].documentos.splice(di, 1);
      expandedEntities[`${cat}-${ei}`] = true;
      saveData(); renderAll();
      showToast('Documento eliminado', 'info');
    }
  }
  else if (action === 'deleteEntity') {
    const cat = el.dataset.cat, ei = +el.dataset.ei;
    const entity = data[cat][ei];
    if (confirm(`¿Eliminar "${entity.nombre}" y todos sus documentos? Esta acción no se puede deshacer.`)) {
      data[cat].splice(ei, 1);
      delete expandedEntities[`${cat}-${ei}`];
      saveData(); renderAll();
      showToast(`${entity.nombre} eliminado correctamente`, 'warning');
    }
  }
  else if (action === 'openReview') {
    const panel = document.getElementById('reviewPanel');
    const overlay = document.getElementById('notifOverlay');
    renderReviewPanel();
    panel.classList.add('open');
    overlay.classList.add('open');
  }
  else if (action === 'closeReview') {
    document.getElementById('reviewPanel').classList.remove('open');
    document.getElementById('notifOverlay').classList.remove('open');
  }
});

document.getElementById('notifOverlay').addEventListener('click', () => {
  document.getElementById('notifPanel').classList.remove('open');
  document.getElementById('reviewPanel').classList.remove('open');
  document.getElementById('notifOverlay').classList.remove('open');
});

document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

// =============================================
//  RENDER ALL
// =============================================
function renderAll() {
  renderSidebar();
  renderTopbar();
  renderMain();
  lucide.createIcons();
}

// =============================================
//  INIT
// =============================================
function init() {
  loadData();
  renderAll();
  setInterval(() => {
    renderTopbar();
    lucide.createIcons();
  }, 60000);
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
